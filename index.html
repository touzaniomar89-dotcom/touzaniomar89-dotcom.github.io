<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WDZ STORE</title>

<style>
body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

.product-box{
background:#111;
padding:30px;
border-radius:12px;
max-width:400px;
margin:auto;
box-shadow:0 0 20px rgba(0,255,100,0.1);
}

h1{
margin-bottom:40px;
}

.price{
color:#00ff66;
font-size:20px;
margin:15px 0;
}

button{
background:#00ff66;
border:none;
padding:12px;
width:100%;
border-radius:8px;
cursor:pointer;
font-weight:bold;
font-size:16px;
}

button:hover{
background:#00cc52;
}
</style>
</head>
<body>

<h1>WDZ STORE</h1>

<div class="product-box">

<h2>TSHIRT BLACK 2</h2>
<p class="price">السعر: 980 ر.س</p>

<button onclick="goToCheckout()">اطلب الآن</button>

</div>

<script>
function goToCheckout(){
  window.location.href = "checkout.html";
}
</script>

</body>
</html>
