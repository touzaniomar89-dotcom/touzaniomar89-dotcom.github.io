<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WDZ STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Cairo', sans-serif;
  background: linear-gradient(135deg, #000000, #0f0f0f, #111);
  color:white;
  min-height:100vh;
}

/* Navbar */

.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
  font-size:22px;
  font-weight:700;
  color:#00ff88;
  letter-spacing:2px;
}

.cart-btn{
  background: linear-gradient(45deg,#00ff88,#00cc66);
  border:none;
  padding:10px 18px;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.cart-btn:hover{
  transform:scale(1.05);
}

/* Container */

.container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:80vh;
  animation:fadeIn 1.2s ease;
}

/* Product Card */

.product{
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:50px;
  text-align:center;
  box-shadow:0 0 40px rgba(0,255,120,0.08);
  transition:0.4s;
  width:350px;
}

.product:hover{
  transform:translateY(-10px);
  box-shadow:0 0 60px rgba(0,255,120,0.2);
}

.product h2{
  margin-bottom:20px;
  font-size:24px;
}

.price{
  color:#00ff88;
  font-size:20px;
  margin-bottom:30px;
  font-weight:bold;
}

/* Button */

.buy-btn{
  background: linear-gradient(45deg,#00ff88,#00cc66);
  border:none;
  padding:14px;
  width:100%;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.buy-btn:hover{
  transform:scale(1.05);
}

/* Footer */

.footer{
  text-align:center;
  padding:20px;
  border-top:1px solid rgba(255,255,255,0.05);
  color:#888;
  font-size:14px;
}

/* Animation */

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">

  <div class="product">
    <img src="black.jpg" class="product-img">
    <h2>2 TSHIRT BLACK</h2>
    <div class="price">980 ر.س</div>
    <button class="buy-btn" onclick="addToCart('2 TSHIRT BLACK',980)">أضف للسلة</button>
    <button class="details-btn" onclick="goToDetails('black')">عرض التفاصيل</button>
  </div>

  <div class="product">
    <img src="white.jpg" class="product-img">
    <h2>TSHIRT WHITE</h2>
    <div class="price">850 ر.س</div>
    <button class="buy-btn" onclick="addToCart('TSHIRT WHITE',850)">أضف للسلة</button>
    <button class="details-btn" onclick="goToDetails('white')">عرض التفاصيل</button>
  </div>

</div>

<div class="footer">
  © 2026 WDZ STORE - جميع الحقوق محفوظة
</div>

<script>

function orderNow(){

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let existing = cart.find(item => item.name === "2 TSHIRT BLACK");

  if(existing){
    existing.quantity += 1;
  } else {
    cart.push({
      name: "2 TSHIRT BLACK",
      price: 980,
      quantity: 1
    });
  }

  localStorage.setItem("cart", JSON.stringify(cart));

  window.location.href = "checkout.html";
}

function goToCheckout(){
  window.location.href = "checkout.html";
}

</script>

</body>
</html>
