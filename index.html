<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WDZ STORE</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0a0a0a;
  color:white;
}

/* Navbar */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#111;
  border-bottom:1px solid #222;
}

.logo{
  font-size:20px;
  font-weight:bold;
  color:#00ff88;
}

.cart-btn{
  background:#00ff88;
  color:black;
  border:none;
  padding:8px 15px;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

/* Product */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:80vh;
}

.product{
  background:#111;
  padding:30px;
  border-radius:15px;
  text-align:center;
  width:350px;
  box-shadow:0 0 25px rgba(0,255,100,0.1);
}

.product h2{
  margin-bottom:10px;
}

.price{
  color:#00ff88;
  font-size:18px;
  margin:15px 0;
}

button{
  background:#00ff88;
  border:none;
  padding:12px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#00cc52;
}

/* Footer */
.footer{
  text-align:center;
  padding:20px;
  background:#111;
  border-top:1px solid #222;
  font-size:13px;
  color:#888;
}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">WDZ STORE</div>
  <button class="cart-btn" onclick="goToCheckout()">🛒 السلة</button>
</div>

<div class="container">
  <div class="product">
    <h2>2 TSHIRT BLACK</h2>
    <p class="price">980 ر.س</p>
    <button onclick="orderNow()">اطلب الآن</button>
  </div>
</div>

<div class="footer">
  © 2026 WDZ STORE - جميع الحقوق محفوظة
</div>

<script>

function orderNow(){

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let existing = cart.find(item => item.name === "2 TSHIRT BLACK");

  if(existing){
    existing.quantity += 1;
  } else {
    cart.push({
      name: "2 TSHIRT BLACK",
      price: 980,
      quantity: 1
    });
  }

  localStorage.setItem("cart", JSON.stringify(cart));

  window.location.href = "checkout.html";
}

function goToCheckout(){
  window.location.href = "checkout.html";
}

</script>
</body>
</html>
