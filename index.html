<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WDZ STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Cairo',sans-serif;
  background:#0f0f0f;
  color:white;
}

/* Navbar */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:#000;
}

.logo{
  color:#00ff88;
  font-size:22px;
  font-weight:bold;
}

.cart{
  cursor:pointer;
  background:#00ff88;
  color:black;
  padding:8px 15px;
  border-radius:10px;
  font-weight:bold;
}

/* Products */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
  padding:40px;
}

.card{
  background:#1a1a1a;
  padding:20px;
  border-radius:15px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  border-radius:10px;
  margin-bottom:15px;
}

.price{
  color:#00ff88;
  margin:10px 0;
  font-weight:bold;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:5px 0;
  width:100%;
  cursor:pointer;
  font-weight:bold;
}

.add{
  background:#00ff88;
  color:black;
}

.details{
  background:#333;
  color:white;
}

.hidden{
  display:none;
}

/* Details */
.details-page{
  padding:40px;
  text-align:center;
}

.details-page img{
  width:300px;
  border-radius:15px;
  margin-bottom:20px;
}

/* Checkout */
.checkout{
  padding:40px;
}

.checkout-item{
  background:#1a1a1a;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

.total{
  margin-top:20px;
  font-size:18px;
  color:#00ff88;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">WDZ STORE</div>
  <div class="cart" onclick="showCheckout()">
    🛒 السلة (<span id="cartCount">0</span>)
  </div>
</div>

<!-- PRODUCTS -->
<div id="home" class="products">

  <div class="card">
    <img src="black.jpg" alt="TSHIRT BLACK">
    <h3>TSHIRT BLACK</h3>
    <div class="price">980 ر.س</div>
    <button class="add" onclick="addToCart('TSHIRT BLACK',980)">أضف للسلة</button>
    <button class="details" onclick="showDetails('TSHIRT BLACK','black.jpg',980)">عرض التفاصيل</button>
  </div>

  <div class="card">
    <img src="white.jpg" alt="TSHIRT WHITE">
    <h3>TSHIRT WHITE</h3>
    <div class="price">850 ر.س</div>
    <button class="add" onclick="addToCart('TSHIRT WHITE',850)">أضف للسلة</button>
    <button class="details" onclick="showDetails('TSHIRT WHITE','white.jpg',850)">عرض التفاصيل</button>
  </div>

</div>

<!-- DETAILS -->
<div id="detailsPage" class="details-page hidden"></div>

<!-- CHECKOUT -->
<div id="checkoutPage" class="checkout hidden"></div>

<!-- ربط ملف الجافاسكربت -->
<script src="main.js"></script>

</body>
</html>
