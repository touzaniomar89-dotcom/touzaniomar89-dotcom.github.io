<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم تأكيد الطلب - WDZ STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0f0f0f;
  color:white;
  font-family:'Cairo',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.box{
  background:#1a1a1a;
  padding:50px 30px;
  border-radius:20px;
  width:90%;
  max-width:500px;
}

h1{
  color:#00ff88;
  margin-bottom:20px;
}

p{
  margin-bottom:30px;
  opacity:0.9;
}

button{
  background:#00ff88;
  border:none;
  padding:15px 25px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  opacity:0.85;
}
</style>
</head>
<body>

<div class="box">
  <h1>🎉 تم تأكيد طلبك</h1>
  <p>سنتواصل معك قريباً لتأكيد تفاصيل الطلب.</p>
  <button onclick="goHome()">العودة للرئيسية</button>
</div>

<script>
localStorage.removeItem("cart");

function goHome(){
  window.location.href="index.html";
}
</script>

</body>
</html>
