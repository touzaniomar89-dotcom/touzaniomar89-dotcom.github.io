<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>السلة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Cairo';background:#000;color:white;padding:40px;}
.item{background:#111;padding:15px;margin-bottom:15px;border-radius:10px;}
.total{color:#00ff88;font-size:20px;margin-top:20px;}
button{background:#00ff88;border:none;padding:10px;border-radius:10px;cursor:pointer;margin-top:10px;}
</style>
</head>
<body>

<h2>🛒 سلة المشتريات</h2>
<div id="cartItems"></div>
<div class="total" id="total"></div>
<button onclick="checkout()">إتمام الطلب</button>

<script>
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let container=document.getElementById("cartItems");
let total=0;

cart.forEach((item,index)=>{
 total+=item.price*item.quantity;
 container.innerHTML+=`
   <div class="item">
     ${item.name} × ${item.quantity}
     <br>${item.price*item.quantity} ر.س
     <br><button onclick="removeItem(${index})">حذف</button>
   </div>
 `;
});

document.getElementById("total").innerText="الإجمالي: "+total+" ر.س";

function removeItem(i){
 cart.splice(i,1);
 localStorage.setItem("cart",JSON.stringify(cart));
 location.reload();
}

function checkout(){
 window.location.href="thankyou.html";
}
</script>

</body>
</html>
