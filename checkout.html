<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - WDZ STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Cairo',sans-serif;
  background:#0f0f0f;
  color:white;
  padding:40px;
}

h1{
  margin-bottom:20px;
}

.checkout-item{
  background:#1a1a1a;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

.total{
  margin-top:20px;
  font-size:18px;
  color:#00ff88;
  font-weight:bold;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

button{
  padding:12px;
  width:100%;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  background:#00ff88;
  color:black;
}
</style>
</head>

<body>

<h1>إتمام الطلب</h1>

<div id="cartContainer"></div>

<form onsubmit="submitOrder(event)">
  <input type="text" placeholder="الاسم الكامل" required>
  <input type="text" placeholder="رقم الجوال" required>
  <input type="text" placeholder="العنوان" required>
  <button type="submit">تأكيد الطلب</button>
</form>

<script src="main.js"></script>

</body>
</html>
