<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إتمام الطلب - WDZ STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Cairo',sans-serif;
  background:#0f0f0f;
  color:white;
  line-height:1.6;
}

.container{
  max-width:800px;
  margin:auto;
  padding:40px 20px;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

/* Cart Box */
.cart-box{
  background:#1a1a1a;
  padding:20px;
  border-radius:15px;
  margin-bottom:30px;
}

.checkout-item{
  background:#111;
  padding:12px;
  border-radius:8px;
  margin-bottom:10px;
}

.total{
  margin-top:20px;
  font-size:18px;
  color:#00ff88;
  font-weight:bold;
}

/* Form */
form{
  background:#1a1a1a;
  padding:20px;
  border-radius:15px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  outline:none;
}

input:focus{
  background:#222;
  color:white;
}

button{
  padding:12px;
  width:100%;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  background:#00ff88;
  color:black;
  transition:0.2s;
  margin-top:10px;
}

button:hover{
  opacity:0.85;
}
</style>
</head>

<body>

<div class="container">

  <h1>إتمام الطلب</h1>

  <!-- Cart Items -->
  <div class="cart-box">
    <div id="cartContainer">
      <!-- سيتم ملؤها بواسطة main.js -->
    </div>
  </div>

  <!-- Customer Info -->
  <form onsubmit="submitOrder(event)">
    <input type="text" id="customerName" placeholder="الاسم الكامل" required>
    <input type="tel" id="customerPhone" placeholder="رقم الجوال" required>
    <input type="text" id="customerAddress" placeholder="العنوان الكامل" required>

    <button type="submit">تأكيد الطلب</button>
  </form>

</div>

<script src="main.js"></script>

</body>
</html>
