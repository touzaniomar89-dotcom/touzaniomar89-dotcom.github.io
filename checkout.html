<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إتمام الطلب | WDZ STORE</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0a0a0a;
  color:white;
  margin:0;
  padding:20px;
  text-align:center;
}

h2{
  margin-top:40px;
}

.box{
  background:#111;
  max-width:420px;
  margin:20px auto;
  padding:25px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,255,100,0.08);
}

.cart-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 0;
  font-size:14px;
}

.remove{
  background:#ff3b3b;
  border:none;
  color:white;
  padding:5px 10px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.remove:hover{
  opacity:0.8;
}

.total{
  margin-top:15px;
  font-size:16px;
  color:#00ff66;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
  background:#222;
  color:white;
  font-size:14px;
}

input:focus{
  outline:none;
  box-shadow:0 0 5px #00ff66;
}

button[type="submit"]{
  background:#00ff66;
  border:none;
  padding:12px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  font-size:15px;
  margin-top:10px;
}

button[type="submit"]:hover{
  background:#00cc52;
}

.empty{
  color:#ff5252;
  margin-top:10px;
}
</style>
</head>
<body>

<h2>🛒 السلة</h2>

<div class="box">
  <div id="cartItems"></div>
  <div class="total" id="total"></div>
  <div class="empty" id="emptyMsg"></div>
</div>

<h2>📦 بيانات الطلب</h2>

<div class="box">
<form id="orderForm">
  <input id="name" placeholder="اسمك الكامل" required>
  <input id="phone" placeholder="رقم الهاتف" required>
  <input id="city" placeholder="المدينة" required>
  <input id="address" placeholder="العنوان الكامل" required>
  <button type="submit">تأكيد الطلب</button>
</form>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

function renderCart(){
  let html = "";
  total = 0;

  if(cart.length === 0){
    document.getElementById("cartItems").innerHTML = "";
    document.getElementById("total").innerText = "";
    document.getElementById("emptyMsg").innerText = "السلة فارغة 🛒";
    return;
  }

  document.getElementById("emptyMsg").innerText = "";

  cart.forEach((item, index)=>{
    total += item.price * item.quantity;

    html += `
      <div class="cart-item">
        <span>${item.name} (${item.quantity} × ${item.price} ر.س)</span>
        <button class="remove" onclick="removeItem(${index})">حذف</button>
      </div>
    `;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = "المجموع: " + total + " ر.س";
}

function removeItem(index){
  cart.splice(index,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

renderCart();

document.getElementById("orderForm").addEventListener("submit", function(e){
  e.preventDefault();
  
  if(cart.length === 0){
    alert("السلة فارغة 🛒");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbynLcGw4Otvlxt85Q-Qqc1XKkQzmW1DKdUzR_cwbvEUFkp9Dd04MkATMfTqyVLmWs7GSg/exec", {
    method:"POST",
    mode:"no-cors",
    body:new URLSearchParams({
      name:document.getElementById("name").value,
      phone:document.getElementById("phone").value,
      city:document.getElementById("city").value,
      address:document.getElementById("address").value,
      product: JSON.stringify(cart),
      total: total
    })
  })
  .then(()=>{
    localStorage.removeItem("cart");
    window.location.href="thankyou.html";
  });
});

</script>

</body>
</html>
